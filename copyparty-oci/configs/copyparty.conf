# /etc/copyparty.conf
[global]
  i: 127.0.0.1
  e2dsa
  e2ts
  ansi

  df: 8
  ver
  grid
  name: files
  theme: 8
  no-robots, force-js
  no-crt
  xff-hdr: cf-connecting-ip
  rproxy: 1  

[accounts]
  username: <password>

[/]
  /media/copyparty
  accs:
    r: *
    rwdma: username
  flags:
    grid
    e2ds
