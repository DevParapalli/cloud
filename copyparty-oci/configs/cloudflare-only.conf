# /etc/nginx/cloudflare-only.conf
# created by the following command
#   (
#     curl -s https://www.cloudflare.com/ips-v4
#     echo
#     curl -s https://www.cloudflare.com/ips-v6
#   ) | grep -v '^$' | sed 's/^/allow /; s/$/;/' | sudo tee /etc/nginx/cloudflare-only.conf
#   echo "" | sudo tee -a /etc/nginx/cloudflare-only.conf
#   echo "deny all;" | sudo tee -a /etc/nginx/cloudflare-only.conf
# to update this file every now and then
# add this to crontab
# 0 3 * * 1 ( curl -s https://www.cloudflare.com/ips-v4; echo; curl -s https://www.cloudflare.com/ips-v6 ) | grep -v '^$' | sed 's/^/allow /; s/$/;/' > /etc/nginx/cloudflare-only.conf && echo "" >> /etc/nginx/cloudflare-only.conf && echo "deny all;" >> /etc/nginx/cloudflare-only.conf && nginx -s reload

