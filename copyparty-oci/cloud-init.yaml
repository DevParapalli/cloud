#cloud-config

package_update: true
package_upgrade: true

packages:
  - nginx
  - curl
  - python3-pip
  - python3-venv
  - iptables-persistent
  - ffmpeg
  - certbot
  - python3-certbot-nginx

write_files:
  
  # tls certs
  - path: /etc/ssl/cloudflare/origin.pem
    owner: root:root
    permissions: '0600'
    content: |
      ${indent(6, cf_cert)}

  - path: /etc/ssl/cloudflare/origin.key
    owner: root:root
    permissions: '0600'
    content: |
      ${indent(6, cf_key)}


  # copyparty
  - path: /etc/copyparty.conf
    owner: root:root
    permissions: '0644'
    content: |
      [global]
        i: 127.0.0.1
        e2dsa
        e2ts
        ansi
        df: 8
        ver
        grid
        name: files
        theme: 8
        no-robots, force-js
        no-crt
        xff-hdr: cf-connecting-ip
        rproxy: 1
      [accounts]
        devparapalli: ${cpp_password}
      [/]
        /media/data/copyparty
        accs:
          rwdma: devparapalli
        flags:
          grid
          e2ds
      [/upload]
        /media/data/copyparty/upload
        accs:
          w: *
          rwdma: devparapalli
        flags:
          grid
          e2ds
      [/public]
        /media/data/copyparty/public
        accs:
          r: *
          rwdma: devparapalli
        flags:
          grid
          e2ds

  # copyparty service
  - path: /etc/systemd/system/copyparty.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=copyparty file server
      After=network.target

      [Service]
      Type=simple
      User=copyparty
      ExecStart=/opt/copyparty/bin/python3 -m copyparty -c /etc/copyparty.conf
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  
  # copyparty site config
  - path: /etc/nginx/sites-available/copyparty
    owner: root:root
    permissions: '0644'
    content: |
      upstream cpp_tcp {
          server 127.0.0.1:3923 fail_timeout=1s;
          keepalive 1;
      }
      server {
          listen 443 ssl;
          listen [::]:443 ssl;
          server_name files.parapalli.dev;
          ssl_certificate     /etc/ssl/cloudflare/origin.pem;
          ssl_certificate_key /etc/ssl/cloudflare/origin.key;
          include /etc/nginx/cloudflare-only.conf;
          real_ip_header CF-Connecting-IP;
          location / {
              proxy_pass http://cpp_tcp;
              proxy_redirect off;
              proxy_http_version 1.1;
              proxy_buffering off;
              proxy_request_buffering off;
              proxy_buffers 32 8k;
              proxy_buffer_size 16k;
              proxy_busy_buffers_size 24k;
              proxy_set_header Connection        "Keep-Alive";
              proxy_set_header Host              $host;
              proxy_set_header X-Real-IP         $remote_addr;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
          }
      }
      server {
          listen 80;
          listen [::]:80;
          server_name files.parapalli.dev;
          include /etc/nginx/cloudflare-only.conf;
          return 301 https://$host$request_uri;
      }
      client_max_body_size 1024M;
      client_header_timeout 610m;
      client_body_timeout 610m;
      send_timeout 610m;

  # soft serve config
  - path: /etc/soft-serve.yaml
    owner: root:root
    permissions: '0644'
    content: |
      name: "scm.parapalli.dev"
      log:
        format: "text"
        time_format: "2006-01-02 15:04:05"
      ssh:
        enabled: true
        listen_addr: "0.0.0.0:23231"
        public_url: "ssh://scm.parapalli.dev:23231"
        key_path: ssh/soft_serve_host_ed25519
        client_key_path: ssh/soft_serve_client_ed25519
        max_timeout: 0
        idle_timeout: 600
      git:
        enabled: false
      http:
        enabled: true
        listen_addr: ":23232"
        tls_key_path: ""
        tls_cert_path: ""
        public_url: "https://scm.parapalli.dev"
        cors:
          allowed_headers:
            - "Accept"
            - "Accept-Language"
            - "Content-Language"
            - "Content-Type"
            - "Origin"
            - "X-Requested-With"
            - "User-Agent"
            - "Authorization"
            - "Access-Control-Request-Method"
            - "Access-Control-Allow-Origin"
          allowed_origins:
            - "https://scm.parapalli.dev"
          allowed_methods:
            - "GET"
            - "HEAD"
            - "POST"
            - "PUT"
            - "OPTIONS"
      stats:
        enabled: true
        listen_addr: "localhost:23233"
      db:
        driver: "sqlite"
        data_source: "soft-serve.db?_pragma=busy_timeout(5000)&_pragma=foreign_keys(1)"
      lfs:
        enabled: true
        ssh_enabled: false
      jobs:
        mirror_pull: "@every 10m"
      initial_admin_keys:
        - "${soft_serve_admin_key}"




  # soft serve service
  - path: /etc/systemd/system/soft-serve.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Soft Serve git server
      After=network.target media-data.mount
 
      [Service]
      Type=simple
      User=softserve
      Environment=SOFT_SERVE_DATA_PATH=/media/data/softserve
      Environment=SOFT_SERVE_CONFIG_LOCATION=/etc/soft-serve.yaml
      Environment=SOFT_SERVE_INITIAL_ADMIN_KEYS=${soft_serve_admin_key}
      ExecStart=/usr/bin/soft serve
      Restart=on-failure
      RestartSec=5
 
      [Install]
      WantedBy=multi-user.target


  # NOTE: certbot will replace ssl_certificate lines after first run
  # HTTP-only placeholder lets certbot's webroot challenge work on first boot
  
  - path: /etc/nginx/sites-available/softserve
    owner: root:root
    permissions: '0644'
    content: |
      upstream softserve_http {
          server 127.0.0.1:23232 fail_timeout=1s;
          keepalive 4;
      }
      server {
          listen 80;
          listen [::]:80;
          server_name scm.parapalli.dev;
          location / {
              proxy_pass http://softserve_http;
              proxy_redirect off;
              proxy_http_version 1.1;
              proxy_buffering off;
              proxy_request_buffering off;
              proxy_set_header Connection "";
              proxy_set_header Host              $host;
              proxy_set_header X-Real-IP         $remote_addr;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          }
      }



  # cf-ips crontab
  - path: /etc/cron.d/cloudflare-ips
    owner: root:root
    permissions: '0644'
    content: |
      0 3 * * 1 root ( curl -s https://www.cloudflare.com/ips-v4; echo; curl -s https://www.cloudflare.com/ips-v6 ) | grep -v '^$' | sed 's/^/allow /; s/$/;/' > /etc/nginx/cloudflare-only.conf && echo "" >> /etc/nginx/cloudflare-only.conf && echo "deny all;" >> /etc/nginx/cloudflare-only.conf && nginx -s reload

runcmd:
  # Block volume — format only if new, then mount
  - |
    if ! blkid /dev/sdb; then
      mkfs.ext4 /dev/sdb
    fi
  - mkdir -p /media/data
  - echo "/dev/sdb /media/data ext4 defaults,_netdev,nofail 0 2" >> /etc/fstab
  - mount -a
  
    # ── OCI host firewall ─────────────────────────────────────────────────────────
  - iptables -I INPUT -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 443 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 23231 -j ACCEPT
  - netfilter-persistent save



  # Cloudflare IP allowlist
  - mkdir -p /etc/ssl/cloudflare
  - |
    ( curl -s https://www.cloudflare.com/ips-v4
      echo
      curl -s https://www.cloudflare.com/ips-v6
    ) | grep -v '^$' | sed 's/^/allow /; s/$/;/' > /etc/nginx/cloudflare-only.conf
  - echo "" >> /etc/nginx/cloudflare-only.conf
  - echo "deny all;" >> /etc/nginx/cloudflare-only.conf

  # soft serve install
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://repo.charm.sh/apt/gpg.key | gpg --dearmor -o /etc/apt/keyrings/charm.gpg
  - echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" > /etc/apt/sources.list.d/charm.list
  - apt update && apt install -y soft-serve


  # copyparty user + venv + softserve
  - useradd -r -s /usr/sbin/nologin -m copyparty
  
  - useradd -r -s /usr/sbin/nologin -m softserve
  
  - mkdir -p /media/data/copyparty
  - mkdir -p /media/data/copyparty/upload
  - mkdir -p /media/data/copyparty/public
  - chown -R copyparty:copyparty /media/data/copyparty
  
  - mkdir -p /media/data/softserve
  - chown -R softserve:softserve /media/data/softserve

  - python3 -m venv /opt/copyparty
  - /opt/copyparty/bin/pip install copyparty


  # Nginx
  - ln -sf /etc/nginx/sites-available/copyparty /etc/nginx/sites-enabled/copyparty
  - rm -f /etc/nginx/sites-enabled/default


  # Enable + start
  - systemctl daemon-reload
  - systemctl enable copyparty soft-serve nginx
  - systemctl start copyparty
  - systemctl start soft-serve
  - nginx -t && systemctl start nginx && systemctl reload nginx

  # certbot stuff
  - certbot --nginx -d scm.parapalli.dev --non-interactive --agree-tos -m parapallidev@gmail.com
  - systemctl reload nginx
